name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r Requirements.txt
    - name: Install PyInstaller
      run: pip install pyinstaller
    - name: Build executable
      run: pyinstaller --onefile Banana.py
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: Banana-linux
        path: dist/Banana

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r Requirements.txt
    - name: Install PyInstaller
      run: pip install pyinstaller
    - name: Build executable
      run: pyinstaller --onefile Banana.py
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: Banana-windows
        path: dist/Banana.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r Requirements.txt
    - name: Install PyInstaller
      run: pip install pyinstaller
    - name: Build executable
      run: pyinstaller --onefile Banana.py
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: Banana-macos
        path: dist/Banana